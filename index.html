<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Letrox</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Tela de Menu -->
        <div id="menu-screen">
            <div class="menu-content">
                <h1 class="game-title">LETROX</h1>
                <div class="records-box">
                    <p>Maior Nível: <span id="record-level">1</span></p>
                    <p>Recorde: <span id="record-score">0</span> pts</p>
                </div>
                <div class="menu-controls">
                    <button id="play-btn" class="primary-btn">▶ Jogar</button>
                    <button id="rules-btn" class="secondary-btn">📖 Regras</button>
                </div>
            </div>
        </div>

        <!-- Tela do Jogo -->
        <div id="game-screen" class="hidden">
            <header>
                <button id="back-btn" class="nav-btn" aria-label="Voltar">⬅</button>
                <div class="stats">
                    <div class="level">🚩 <span id="level-display">1</span></div>
                    <div class="score">⭐ <span id="score-display">0000</span></div>
                </div>
                <button id="next-level-btn" disabled>Próxima Fase</button>
            </header>

            <main id="board-container">
                <div id="words-board">
                    <!-- As palavras ocultas serão renderizadas aqui -->
                </div>
            </main>

            <footer>
                <div id="input-area">
                    <!-- Letras selecionadas aparecem aqui -->
                </div>
                
                <div id="deck-area">
                    <!-- Letras disponíveis aparecem aqui -->
                </div>

                <div class="controls">
                    <button id="hint-btn" aria-label="Poderes">⚡</button>
                    <button id="submit-btn">Enviar</button>
                    <button id="shuffle-btn" aria-label="Embaralhar">🔀</button>
                </div>
            </footer>
        </div>
    </div>
    
    <!-- Modal de Fim de Jogo ou Avisos -->
    <div id="modal" class="hidden">
        <div class="modal-content">
            <h2 id="modal-title">Mensagem</h2>
            <p id="modal-text">Texto</p>
            <button id="modal-btn">Continuar</button>
        </div>
    </div>

    <!-- Modal de Poderes -->
    <div id="powers-modal" class="hidden">
        <div class="modal-content powers-content">
            <h2>⚡ Poderes</h2>
            <p style="font-size: 0.9rem; margin-bottom: 20px; color: var(--text-muted);">Use uma vez por partida</p>
            <div class="powers-list">
                <button id="power-first-letter" class="power-btn">
                    <span class="power-icon">🅰️</span>
                    <div class="power-info">
                        <strong>Letra Inicial</strong>
                        <span style="font-size: 0.8rem; font-weight: 400; opacity: 0.8;">Revela a 1ª letra de tudo</span>
                    </div>
                </button>
                <button id="power-random-letter" class="power-btn">
                    <span class="power-icon">🎲</span>
                    <div class="power-info">
                        <strong>Letra Surpresa</strong>
                        <span style="font-size: 0.8rem; font-weight: 400; opacity: 0.8;">Revela 1 letra aleatória</span>
                    </div>
                </button>
            </div>
            <button id="close-powers-btn" class="secondary-btn" style="margin-top: 15px; width: 100%;">Voltar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
